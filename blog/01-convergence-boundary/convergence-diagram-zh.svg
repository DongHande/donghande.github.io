<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
<title>收敛与不收敛</title>
<desc>左侧误差衰减曲线（收敛），右侧误差指数放大曲线（不收敛）</desc>
<style>
.label{font-family:system-ui,-apple-system,sans-serif;font-size:13px;fill:#1a1a1a;font-weight:500}
.sub{font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#666;font-weight:400}
.axis{stroke:#bbb;stroke-width:0.5}
</style>

<!-- Left panel: convergence -->
<line x1="60" y1="40" x2="60" y2="240" class="axis"/>
<line x1="60" y1="240" x2="310" y2="240" class="axis"/>
<text class="label" x="170" y="28" text-anchor="middle">收敛</text>
<text class="sub" x="170" y="270" text-anchor="middle">步数</text>
<text class="sub" x="42" y="140" text-anchor="middle" transform="rotate(-90,42,140)">误差</text>

<!-- Decay curve -->
<path d="M70 80 C100 82, 120 130, 150 170 C180 200, 220 225, 300 232" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"/>

<!-- Dashed zero line -->
<line x1="60" y1="235" x2="310" y2="235" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>

<!-- Right panel: divergence -->
<line x1="380" y1="40" x2="380" y2="240" class="axis"/>
<line x1="380" y1="240" x2="630" y2="240" class="axis"/>
<text class="label" x="490" y="28" text-anchor="middle">不收敛</text>
<text class="sub" x="490" y="270" text-anchor="middle">步数</text>
<text class="sub" x="362" y="140" text-anchor="middle" transform="rotate(-90,362,140)">误差</text>

<!-- Exponential growth curve -->
<path d="M390 228 C420 225, 445 220, 470 210 C495 196, 520 170, 545 130 C565 95, 580 60, 590 42" fill="none" stroke="#A32D2D" stroke-width="2" stroke-linecap="round"/>

<!-- Annotations -->
<text class="sub" x="260" y="215" fill="#185FA5">误差衰减</text>
<text class="sub" x="540" y="80" fill="#A32D2D">误差放大</text>

<!-- Divider -->
<line x1="340" y1="30" x2="340" y2="260" stroke="rgba(0,0,0,0.1)" stroke-width="0.5" stroke-dasharray="3 4"/>

<!-- Bottom caption -->
<text class="sub" x="340" y="300" text-anchor="middle">模型建立在不变的假设上 → 收敛；建立在会变的细节上 → 不收敛</text>
</svg>
